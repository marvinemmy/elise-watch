name: Build ELISE Watch APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease -PversionCode=${{ github.run_number }} --no-daemon
        env:
          GRADLE_OPTS: "-Xmx4g"

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release-unsigned.apk ELISE_Watch_v1.0.${{ github.run_number }}.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ELISE-Watch-v1.0.${{ github.run_number }}
          path: ELISE_Watch_v1.0.${{ github.run_number }}.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: ELISE Watch v1.0.${{ github.run_number }}
          files: ELISE_Watch_v1.0.${{ github.run_number }}.apk
          draft: false
          prerelease: false
          body: |
            ## ELISE Watch v1.0.${{ github.run_number }}

            **Installation / Mise à jour :**
            ```bash
            adb connect <IP_MONTRE>:5555
            adb install -r ELISE_Watch_v1.0.${{ github.run_number }}.apk
            ```

            L'application vérifie automatiquement les nouvelles versions au démarrage.
