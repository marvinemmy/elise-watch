name: Build ELISE Watch APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Xmx2g -XX:MaxMetaspaceSize=512m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ELISE-Watch-v1.0
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: Copy APK to release
        run: cp app/build/outputs/apk/release/app-release-unsigned.apk ELISE_Watch_v1.0.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/heads/master')
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: ELISE Watch v1.0.${{ github.run_number }}
          files: ELISE_Watch_v1.0.apk
          draft: false
          prerelease: false
