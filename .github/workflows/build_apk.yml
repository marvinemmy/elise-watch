name: Build ELISE Watch APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK (auto-signed)
        run: ./gradlew assembleDebug -PversionCode=${{ github.run_number }} --no-daemon
        env:
          GRADLE_OPTS: "-Xmx4g"

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk ELISE_Watch_v1.0.${{ github.run_number }}.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ELISE-Watch-v1.0.${{ github.run_number }}
          path: ELISE_Watch_v1.0.${{ github.run_number }}.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: ELISE Watch v1.0.${{ github.run_number }}
          files: ELISE_Watch_v1.0.${{ github.run_number }}.apk
          draft: false
          prerelease: false
          body: |
            ## ELISE Watch v1.0.${{ github.run_number }}
            L'application vérifie automatiquement les nouvelles versions au démarrage.

      - name: Deploy APK to lnsgroup.dev (OTA)
        run: |
          curl -s -X POST "https://lnsgroup.dev/apk/upload?token=S3W9bJQDqayn1ckjfo8S57UhzBk-KPuqkprMq293kQU" \
            -F "file=@ELISE_Watch_v1.0.${{ github.run_number }}.apk" \
            -F "version_code=${{ github.run_number }}" \
            && echo "APK deployed to lnsgroup.dev" || echo "OTA upload failed (non-fatal)"
