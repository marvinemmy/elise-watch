name: Build ELISE APKs

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Watch APK + Phone Companion APK
        run: ./gradlew :app:assembleRelease :phone:assembleRelease -PversionCode=${{ github.run_number }} --no-daemon
        env:
          GRADLE_OPTS: "-Xmx4g"
          KEYSTORE_PATH: ${{ github.workspace }}/elise-release.keystore
          KEYSTORE_PASSWORD: elise2026
          KEY_ALIAS: elise
          KEY_PASSWORD: elise2026

      - name: Rename APKs
        run: |
          cp app/build/outputs/apk/release/app-release.apk ELISE_Watch_v1.0.${{ github.run_number }}.apk
          cp phone/build/outputs/apk/release/phone-release.apk ELISE_Companion_v1.0.${{ github.run_number }}.apk

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ELISE-v1.0.${{ github.run_number }}
          path: |
            ELISE_Watch_v1.0.${{ github.run_number }}.apk
            ELISE_Companion_v1.0.${{ github.run_number }}.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: ELISE v1.0.${{ github.run_number }}
          files: |
            ELISE_Watch_v1.0.${{ github.run_number }}.apk
            ELISE_Companion_v1.0.${{ github.run_number }}.apk
          draft: false
          prerelease: false
          body: |
            ## ELISE v1.0.${{ github.run_number }}
            **Installation (première fois) :**
            1. Télécharge `ELISE_Companion_v1.0.${{ github.run_number }}.apk` sur ton téléphone
            2. Installe-le (autoriser sources inconnues)
            3. L'app montre s'installe automatiquement via Bluetooth

            **Mises à jour suivantes :** automatiques via OTA au démarrage de l'app.

      - name: Deploy Watch APK to lnsgroup.dev (OTA)
        run: |
          curl -s -X POST "https://lnsgroup.dev/apk/upload?token=S3W9bJQDqayn1ckjfo8S57UhzBk-KPuqkprMq293kQU" \
            -F "file=@ELISE_Watch_v1.0.${{ github.run_number }}.apk" \
            -F "version_code=${{ github.run_number }}" \
            && echo "Watch APK deployed" || echo "Watch OTA upload failed (non-fatal)"

      - name: Deploy Companion APK to lnsgroup.dev (OTA)
        run: |
          curl -s -X POST "https://lnsgroup.dev/apk/companion/upload?token=S3W9bJQDqayn1ckjfo8S57UhzBk-KPuqkprMq293kQU" \
            -F "file=@ELISE_Companion_v1.0.${{ github.run_number }}.apk" \
            -F "version_code=${{ github.run_number }}" \
            && echo "Companion APK deployed" || echo "Companion OTA upload failed (non-fatal)"
